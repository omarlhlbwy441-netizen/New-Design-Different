
        <!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>New Design Different</title>
            <link rel="stylesheet" href="css/style.css">
            <style>
                :root { --gold: #d4af37; --onyx: #050505; }
                body { background: var(--onyx); color: #fff; font-family: sans-serif; margin:0; display:flex; height:100vh; }
                .sidebar { width: 250px; border-left: 1px solid var(--gold); padding: 20px; background:#000; }
                .nav-item { padding:15px; cursor:pointer; border-bottom:1px solid #222; }
                .nav-item:hover { color: var(--gold); }
                .main { flex:1; padding:40px; overflow-y:auto; background: radial-gradient(circle, #111, #000); }
                .page-node { background:#222; border:1px solid #444; padding:10px; text-align:center; cursor:pointer; font-size:10px; }
                .page-node:hover { border-color: var(--gold); }
            </style>
        </head>
        <body>
            <div class="sidebar">
                <h2 style="color:var(--gold)">NDD System</h2>
                <div class="nav-item" onclick="NDD_CORE.loadPage('dashboard')">🏠 الرئيسية</div>
                <div class="nav-item" onclick="NDD_CORE.loadPage('medical')">🏥 العيادة</div>
                <div class="nav-item" onclick="NDD_CORE.loadPage('finance')">💰 الاستثمار</div>
                <div class="nav-item" onclick="NDD_CORE.loadPage('pages')">📑 الـ 100 صفحة</div>
            </div>
            <div class="main" id="main-viewport"></div>
            <script src="js/core.js"></script>
        </body>
        </html>
