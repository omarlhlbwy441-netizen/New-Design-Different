<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Design Different | المنصة المتكاملة</title>
    <style>
        :root { --gold: #d4af37; --onyx: #050505; --panel: #161b22; }
        body { background: var(--onyx); color: #fff; margin: 0; font-family: 'Segoe UI', Tahoma; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #000; border-left: 2px solid var(--gold); display: flex; flex-direction: column; }
        .brand { padding: 40px 20px; text-align: center; color: var(--gold); font-size: 1.8rem; font-weight: bold; border-bottom: 1px solid #222; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .nav-item:hover { background: rgba(212,175,55,0.1); color: var(--gold); padding-right: 35px; }
        .main { flex: 1; padding: 50px; background: radial-gradient(circle, #1a1a1a, #000); overflow-y: auto; }
        .card { background: var(--panel); border: 1px solid #333; border-radius: 20px; padding: 40px; border-right: 8px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); font-size: 2.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 20px; }
        .node { background: #222; border: 1px solid #444; padding: 10px; text-align: center; border-radius: 5px; color: var(--gold); font-size: 11px; }
        button { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">NEW DESIGN</div>
        <div class="nav-item" onclick="show('home')">🏠 الرئيسية</div>
        <div class="nav-item" onclick="show('medical')">🏥 العيادة الذكية</div>
        <div class="nav-item" onclick="show('finance')">💰 مركز الاستثمار</div>
        <div class="nav-item" onclick="show('units')">📑 الـ 151 وحدة</div>
    </div>
    <div class="main" id="content">
        <div class="card">
            <h1>مرحباً بك يا مهندس عمر</h1>
            <p>المنظومة التفاعلية نشطة الآن. جميع الوحدات الـ 151 مرتبطة بالعصب المركزي.</p>
        </div>
    </div>
    <script>
        const data = {
            home: `<div class="card"><h1>القلعة الرئيسية</h1><p>الحالة: متصل. كافة الأنظمة تعمل بكفاءة تحت إشرافك.</p></div>`,
            medical: `<div class="card"><h2>🏥 العيادة الذكية</h2><p>أدخل بيانات الحالة للتحليل عبر الـ 151 وحدة:</p><textarea style="width:100%;height:150px;background:#000;color:#0f0;border:1px solid var(--gold);padding:15px;"></textarea><br><button>بدء التشخيص</button></div>`,
            finance: `<div class="card"><h2>💰 مركز الاستثمار CVIP</h2><p>إدارة المحافظ والسيولة اللانهائية نشطة حالياً.</p><button>تقرير الأرباح</button></div>`,
            units: `<div class="card"><h2>📑 الـ 151 وحدة السيادية</h2><div class="grid">${Array.from({length: 151}, (_, i) => `<div class="node">وحدة ${i+1}</div>`).join('')}</div></div>`
        };
        function show(p) { document.getElementById('content').innerHTML = data[p]; }
    </script>
</body>
</html>
